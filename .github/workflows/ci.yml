name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Typecheck + Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (3 workspaces)
        run: pnpm -r typecheck

      - name: Test (vitest, 38 cases)
        run: pnpm -r test
        env:
          # demo-merchant needs these even in test mode to satisfy zod env schema
          PAYKIT_API_KEY: testkey_ci_placeholder_12345678901234567890
          PAYKIT_WEBHOOK_SECRET: testsec_ci_placeholder_12345678901234567890
