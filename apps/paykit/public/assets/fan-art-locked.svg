<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Locked fan art preview">
  <title>Fan Art Image Unlock — Locked state (PayKit demo placeholder, creator-owned)</title>
  <defs>
    <linearGradient id="bgLocked" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="14" /></filter>
    <pattern id="grain" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.4" fill="#475569" opacity="0.4" />
    </pattern>
  </defs>

  <rect width="800" height="600" fill="url(#bgLocked)" />

  <g filter="url(#blur)" opacity="0.55">
    <circle cx="280" cy="220" r="120" fill="#6366f1" />
    <circle cx="520" cy="280" r="140" fill="#ec4899" />
    <circle cx="400" cy="440" r="160" fill="#8b5cf6" />
  </g>

  <rect width="800" height="600" fill="url(#grain)" opacity="0.3" />
  <rect width="800" height="600" fill="#0f172a" opacity="0.55" />

  <g transform="translate(400, 240)">
    <rect x="-26" y="-12" width="52" height="42" rx="6" fill="none" stroke="#e2e8f0" stroke-width="3" />
    <path d="M -18,-12 V -28 a 18,18 0 0 1 36,0 V -12" fill="none" stroke="#e2e8f0" stroke-width="3" />
    <circle cx="0" cy="10" r="4" fill="#e2e8f0" />
  </g>

  <text x="400" y="350" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="#f1f5f9">
    Locked
  </text>
  <text x="400" y="390" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#94a3b8">
    Unlock high-res fan art with 1 XRP
  </text>
  <text x="400" y="430" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13" fill="#64748b">
    Payment intent → Xaman → XRPL 9-gate verify → signed webhook → unlock
  </text>

  <text x="400" y="570" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#475569">
    PayKit demo placeholder · creator-owned artwork only (PRD §6 IP boundary)
  </text>
</svg>
